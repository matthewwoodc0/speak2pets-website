# This file follows the Firebase Hosting GitHub Actions pattern used by Firebase CLI projects.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Authenticate to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPEAK2PETS_WEBSITE }}
        run: |
          credentials_file="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$credentials_file"
          chmod 600 "$credentials_file"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_file" >> "$GITHUB_ENV"
      - name: Deploy to Firebase Hosting
        run: |
          set -o pipefail
          deploy_log="$(mktemp)"

          for attempt in 1 2 3; do
            echo "Firebase deploy attempt $attempt"
            if npx firebase deploy --only hosting --project speak2pets-website --non-interactive 2>&1 | tee "$deploy_log"; then
              exit 0
            fi

            if grep -q "is the current active version" "$deploy_log"; then
              echo "Firebase reports this version is already active; treating the deploy as successful."
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 10))
            fi
          done

          exit 1
